<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="BTC Signale"/>
  <meta name="theme-color" content="#060608"/>
  <link rel="manifest" href="./manifest.json"/>
  <link rel="apple-touch-icon" href="./btc-icon.svg"/>
  <title>BTC Signale</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#060608;--card:#0d0d1b;--bdr:rgba(255,255,255,.07);
      --long:#00cc88;--short:#ff2244;--neu:#445599;--gold:#ffd700;
      --txt:#e8eaff;--dim:#556688;--r:18px;
      --pt:env(safe-area-inset-top,0px);--pb:env(safe-area-inset-bottom,0px);
    }
    html,body{height:100%;background:var(--bg);color:var(--txt);
      font-family:-apple-system,system-ui,'Segoe UI',Helvetica,sans-serif;overflow:hidden}
    .app{display:flex;flex-direction:column;height:100dvh;
      padding:calc(var(--pt) + 10px) 12px calc(var(--pb) + 8px);
      gap:8px;max-width:520px;margin:0 auto;overflow:hidden}

    /* ── Header ── */
    .hdr{display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .brand{font-size:16px;font-weight:900;letter-spacing:.06em;color:var(--gold)}
    .price-box{text-align:right}
    .price{font-size:22px;font-weight:900;color:#fff;letter-spacing:-.01em}
    .price-chg{font-size:12px;font-weight:700;margin-top:1px}

    /* ── Status bar ── */
    .status{display:flex;align-items:center;justify-content:space-between;
      font-size:11px;color:var(--dim);flex-shrink:0}
    .dot{display:inline-block;width:7px;height:7px;border-radius:50%;
      background:#ff2244;margin-right:5px;flex-shrink:0;transition:background .4s}
    .dot.live{background:var(--long);box-shadow:0 0 6px var(--long)}
    .dot.warn{background:#ffaa00;box-shadow:0 0 6px #ffaa00}

    /* ── Signal cards ── */
    .cards{display:flex;flex-direction:column;gap:8px;flex:1;min-height:0;overflow-y:auto}
    .card{background:var(--card);border:1.5px solid var(--bdr);border-radius:var(--r);
      padding:14px 14px 12px;flex-shrink:0}
    .card.gp{border-color:var(--gold);animation:gp 1.6s ease-in-out infinite alternate}
    @keyframes gp{from{box-shadow:0 0 8px #ffd70040}to{box-shadow:0 0 28px #ffd700aa}}

    .card-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .card-type{font-size:10px;font-weight:800;letter-spacing:.15em;color:var(--dim);text-transform:uppercase}
    .rr{font-size:10px;background:rgba(255,255,255,.07);border-radius:6px;padding:2px 8px;color:var(--txt)}

    .score-row{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
    .score-n{font-size:54px;font-weight:900;line-height:1;min-width:70px}
    .score-meta{display:flex;flex-direction:column;gap:2px}
    .score-lbl{font-size:14px;font-weight:800;letter-spacing:.05em}
    .score-dir{font-size:13px;font-weight:700}
    .score-dir.long{color:var(--long);text-shadow:0 0 14px var(--long)}
    .score-dir.short{color:var(--short);text-shadow:0 0 14px var(--short)}
    .score-dir.neutral{color:var(--neu)}

    .rec{font-size:11.5px;color:var(--dim);line-height:1.5;margin-top:6px}
    .chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
    .chip{font-size:10px;border-radius:7px;padding:2px 8px;
      border:1px solid var(--bdr);background:rgba(255,255,255,.03);white-space:nowrap}
    .chip.g{border-color:var(--long);color:var(--long)}
    .chip.r{border-color:var(--short);color:var(--short)}
    .chip.y{border-color:#ffaa00;color:#ffaa00}

    /* ── History ── */
    .hist{flex-shrink:0}
    .hist-hd{font-size:10px;font-weight:800;letter-spacing:.12em;color:var(--dim);
      text-transform:uppercase;margin-bottom:6px}
    .hist-list{display:flex;flex-direction:column;gap:4px}
    .hist-row{display:flex;justify-content:space-between;align-items:center;
      background:var(--card);border:1px solid var(--bdr);border-radius:10px;
      padding:5px 10px;font-size:11px}
    .hist-time{color:var(--dim)}
    .hs{font-weight:700}

    /* ── Install banner ── */
    .install{background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.2);
      border-radius:12px;padding:10px 12px;display:flex;justify-content:space-between;
      align-items:center;flex-shrink:0}
    .install button{background:var(--gold);color:#000;border:none;border-radius:8px;
      padding:5px 14px;font-weight:800;font-size:12px;cursor:pointer}

    /* ── Loading pulse ── */
    .pulse{animation:pulse 1.2s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
  </style>
</head>
<body>
<div class="app">

  <div id="installBanner" class="install" style="display:none">
    <span style="font-size:12px;font-weight:700">📲 Als App speichern</span>
    <button id="installBtn">Installieren</button>
  </div>

  <div class="hdr">
    <span class="brand">₿ SIGNALE</span>
    <div class="price-box">
      <div class="price" id="priceEl">–</div>
      <div class="price-chg" id="priceChgEl" style="color:var(--dim)"></div>
    </div>
  </div>

  <div class="status">
    <span><span class="dot" id="dot"></span><span id="statusTxt">Verbinde mit Binance…</span></span>
    <span id="clockEl"></span>
  </div>

  <div class="cards">

    <!-- PHASE -->
    <div class="card" id="phaseCard">
      <div class="card-hd">
        <span class="card-type">Phase</span>
        <span class="rr" id="phaseRR"></span>
      </div>
      <div class="score-row">
        <span class="score-n pulse" id="phaseScore" style="color:var(--neu)">–</span>
        <div class="score-meta">
          <span class="score-lbl" id="phaseLbl">WARTEN</span>
          <span class="score-dir neutral" id="phaseDir">◈ NEUTRAL</span>
        </div>
      </div>
      <div class="rec" id="phaseRec">Warte auf Marktdaten…</div>
      <div class="chips" id="phaseChips"></div>
    </div>

    <!-- WELLE -->
    <div class="card" id="waveCard">
      <div class="card-hd">
        <span class="card-type">Welle</span>
        <span class="rr" id="waveRR"></span>
      </div>
      <div class="score-row">
        <span class="score-n pulse" id="waveScore" style="color:var(--neu)">–</span>
        <div class="score-meta">
          <span class="score-lbl" id="waveLbl">WARTEN</span>
          <span class="score-dir neutral" id="waveDir">◈ NEUTRAL</span>
        </div>
      </div>
      <div class="rec" id="waveRec">Warte auf Orderbuch…</div>
      <div class="chips" id="waveChips"></div>
    </div>

    <!-- HISTORY -->
    <div class="hist">
      <div class="hist-hd">Verlauf (Gedächtnis)</div>
      <div class="hist-list" id="histList">
        <div style="color:var(--dim);font-size:11px;padding:4px 2px">Noch keine Signale gespeichert</div>
      </div>
    </div>

  </div><!-- /cards -->
</div><!-- /app -->

<script>
'use strict';

// ─── Live state ─────────────────────────────────────────────────────────────
const L = {
  price: null, price24hChg: 0, priceSess: null,
  cvd: 0, cvdSnaps: [],           // [{ts,cvd,price}] every 30s
  bidTotal: null, askTotal: null,  // current depth
  ofiWindow: [], ofiZ: 0,          // rolling OFI z-score
  fundRate: 0, fundHist: [], fundConsec: 0, fundSig: 'neutral', fundExt: false, fundPer: false,
  oiHist: [], oiRegime: 'neutral',
  volatility: 'normal', atrWindow: [],
  connected: false, dataReady: false,
};

// ─── WebSocket ───────────────────────────────────────────────────────────────
let ws, wsTimer, wsBacks = 0;

function connect() {
  const streams = [
    'btcusdt@aggTrade',
    'btcusdt@depth5@500ms',
    'btcusdt@markPrice@1s',
    'btcusdt@kline_1m',
  ].join('/');
  ws = new WebSocket('wss://fstream.binance.com/stream?streams=' + streams);
  ws.onopen  = () => { L.connected = true; wsBacks = 0; setStatus('live', 'Live · Binance Futures'); };
  ws.onclose = ws.onerror = () => {
    L.connected = false;
    const wait = Math.min(30, 3 * ++wsBacks);
    setStatus('', `Reconnect in ${wait}s…`);
    clearTimeout(wsTimer);
    wsTimer = setTimeout(connect, wait * 1000);
  };
  ws.onmessage = ({ data }) => {
    const msg = JSON.parse(data);
    const s = msg.stream, d = msg.data;
    if (s.endsWith('aggTrade'))       onTrade(d);
    else if (s.endsWith('500ms'))     onDepth(d);
    else if (s.endsWith('1s'))        onMark(d);
    else if (s.endsWith('kline_1m')) onKline(d);
  };
}

function onTrade(d) {
  // m=true → market maker on buy side → sell aggressor → CVD down
  L.cvd += d.m ? -parseFloat(d.q) : +parseFloat(d.q);
  L.price = parseFloat(d.p);
  if (L.priceSess === null) L.priceSess = L.price;
  L.dataReady = true;
}

function onDepth(d) {
  const bid = d.b.slice(0,5).reduce((s,[,q])=>s+parseFloat(q),0);
  const ask = d.a.slice(0,5).reduce((s,[,q])=>s+parseFloat(q),0);
  if (L.bidTotal !== null) {
    const ofi = (bid - L.bidTotal) - (ask - L.askTotal);
    L.ofiWindow.push(ofi);
    if (L.ofiWindow.length > 120) L.ofiWindow.shift();
    L.ofiZ = zscore(L.ofiWindow);
  }
  L.bidTotal = bid; L.askTotal = ask;
}

function onMark(d) {
  L.fundRate = parseFloat(d.r);
  L.fundHist.push(L.fundRate);
  if (L.fundHist.length > 500) L.fundHist.shift();
  if (L.price) L.price = parseFloat(d.p); // mark price ≈ spot
  computeFunding();
}

function onKline(d) {
  if (!d.k.x) return; // wait for closed bar
  const h = parseFloat(d.k.h), lo = parseFloat(d.k.l), c = parseFloat(d.k.c);
  const range = (h - lo) / c;
  L.atrWindow.push(range);
  if (L.atrWindow.length > 100) L.atrWindow.shift();
  if (L.atrWindow.length >= 20) {
    const sorted = [...L.atrWindow].sort((a,b)=>a-b);
    const n = sorted.length;
    L.volatility = range < sorted[Math.floor(n*.25)] ? 'compressed'
                 : range > sorted[Math.floor(n*.75)] ? 'expanded' : 'normal';
  }
  if (L.priceSess === null) L.priceSess = parseFloat(d.k.o);
}

// ─── Periodic: OI + CVD snapshot ─────────────────────────────────────────────
async function fetchOI() {
  try {
    const r = await fetch('https://fapi.binance.com/fapi/v1/openInterest?symbol=BTCUSDT');
    const j = await r.json();
    const oi = parseFloat(j.openInterest);
    L.oiHist.push({ ts: Date.now(), oi, price: L.price });
    if (L.oiHist.length > 40) L.oiHist.shift();
    if (L.oiHist.length >= 2) {
      const [a, b] = [L.oiHist.at(-2), L.oiHist.at(-1)];
      const dOI    = (b.oi    - a.oi)    / a.oi;
      const dPrice = a.price && b.price ? (b.price - a.price) / a.price : 0;
      if      (dOI >  0.0005 && dPrice >  0) L.oiRegime = 'long_build';
      else if (dOI >  0.0005 && dPrice <= 0) L.oiRegime = 'short_build';
      else if (dOI < -0.0005 && dPrice >  0) L.oiRegime = 'short_cover';
      else if (dOI < -0.0005 && dPrice <= 0) L.oiRegime = 'long_exit';
      else                                    L.oiRegime = 'neutral';
    }
  } catch(_) {}
}

async function fetch24h() {
  try {
    const r = await fetch('https://fapi.binance.com/fapi/v1/ticker/24hr?symbol=BTCUSDT');
    const j = await r.json();
    L.price = parseFloat(j.lastPrice);
    L.price24hChg = parseFloat(j.priceChangePercent) / 100;
    L.dataReady = true;
  } catch(_) {}
}

function snapshotCVD() {
  if (L.price) {
    L.cvdSnaps.push({ ts: Date.now(), cvd: L.cvd, price: L.price });
    if (L.cvdSnaps.length > 50) L.cvdSnaps.shift();
  }
}

// ─── Funding extreme ──────────────────────────────────────────────────────────
function computeFunding() {
  if (L.fundHist.length < 5) return;
  const r = L.fundRate;
  const sorted = [...L.fundHist].sort((a,b)=>a-b);
  const pct = sorted.filter(v=>v<=r).length / sorted.length * 100;
  let sig = 'neutral', ext = false;
  if      (pct >= 90) { sig = 'extreme_positive'; ext = true; L.fundConsec++; }
  else if (pct <= 10) { sig = 'extreme_negative'; ext = true; L.fundConsec++; }
  else { L.fundConsec = 0;
    if      (pct >= 72) sig = 'elevated';
    else if (pct <= 28) sig = 'depressed';
  }
  L.fundSig = sig; L.fundExt = ext; L.fundPer = L.fundConsec >= 3;
}

// ─── Signal computation ───────────────────────────────────────────────────────
function computeWave() {
  const ofi = L.ofiZ;
  const depthRatio = L.askTotal > 0 ? L.bidTotal / L.askTotal : 1;
  const cvdBull = L.cvd >= 0;

  // CVD divergence (from snapshots)
  let cvdDiv = 'none';
  if (L.cvdSnaps.length >= 4) {
    const h = L.cvdSnaps.slice(-4);
    const cvdUp    = h.at(-1).cvd   > h[0].cvd;
    const priceUp  = h.at(-1).price > h[0].price;
    if ( cvdUp && !priceUp) cvdDiv = 'bullish_divergence';
    if (!cvdUp &&  priceUp) cvdDiv = 'bearish_divergence';
  }

  // OFI component (40 pts max)
  const absOfi = Math.abs(ofi);
  const ofiScore  = absOfi >= 1.5 ? Math.min(40, 20 + (absOfi - 1.5) * 15) : absOfi >= 1 ? 10 : 0;
  const ofiLong   = ofi > 0;

  // CVD component (25 pts max)
  const cvdScore = cvdDiv === 'bullish_divergence' ? 25
                 : cvdDiv === 'bearish_divergence' ? 25
                 : cvdBull ? 18 : 15;
  const cvdLong  = cvdDiv === 'bullish_divergence' ? true
                 : cvdDiv === 'bearish_divergence' ? false
                 : cvdBull;

  // Depth component (20 pts max)
  const depthScore = depthRatio > 1.3 ? 20 : depthRatio > 1.1 ? 14 : depthRatio < 0.8 ? 14 : 6;
  const depthLong  = depthRatio > 1;

  // Volatility bonus (15 pts max)
  const volScore = L.volatility === 'compressed' ? 12 : L.volatility === 'normal' ? 7 : 4;

  // Direction by majority vote
  const lVotes = [ofiLong, cvdLong, depthLong].filter(Boolean).length;
  const dir = lVotes >= 2 ? 'long' : 'short';

  const directional = dir === 'long'
    ? (ofiLong?ofiScore:0) + (cvdLong?cvdScore:0) + (depthLong?depthScore:0)
    : (!ofiLong?ofiScore:0) + (!cvdLong?cvdScore:0) + (!depthLong?depthScore:0);
  const score = Math.min(100, Math.round(directional + volScore));
  const triggered = score >= 55;

  const priceChange = L.priceSess && L.price ? (L.price - L.priceSess) / L.priceSess : 0;

  return {
    score, dir: triggered ? dir : 'neutral', triggered,
    ofiZ: ofi.toFixed(2), depthRatio: depthRatio.toFixed(2),
    cvdTrend: L.cvd >= 0 ? '▲' : '▼', cvdDiv,
    priceChange,
    rec: !triggered ? 'Kein Wellen-Signal — Orderbuch neutral.'
       : dir === 'long' ? `Kaufdruck · OFI ${ofi.toFixed(1)}σ · Tiefe ${depthRatio.toFixed(2)}`
       :                  `Verkaufsdruck · OFI ${ofi.toFixed(1)}σ · Tiefe ${depthRatio.toFixed(2)}`,
  };
}

function computePhase(wave) {
  let tL = 0, tS = 0, rL = 0, rS = 0;

  // OI regime (30 pts)
  if      (L.oiRegime === 'long_build')  tL += 30;
  else if (L.oiRegime === 'short_build') tS += 30;
  else if (L.oiRegime === 'short_cover') tL += 20;
  else if (L.oiRegime === 'long_exit')   tS += 20;

  // Funding extreme → reversal signal (25 pts)
  if (L.fundExt) {
    if (L.fundSig === 'extreme_positive') rS += L.fundPer ? 25 : 15;
    if (L.fundSig === 'extreme_negative') rL += L.fundPer ? 25 : 15;
  } else {
    if (L.fundSig === 'elevated')  tL += 5;
    if (L.fundSig === 'depressed') tS += 5;
  }

  // CVD confirmation (20 pts)
  if (L.cvd > 0) { tL += 20; rS += 5; }
  else           { tS += 20; rL += 5; }

  // Wave alignment (15 pts)
  if (wave.triggered) {
    if (wave.dir === 'long')  { tL += 15; rL += 8; }
    if (wave.dir === 'short') { tS += 15; rS += 8; }
  }

  // Seasonality (10 pts)
  const sess = getSession();
  const bonus = Math.round(sess.activityScore * 10);
  tL += bonus; tS += bonus;

  const best = Math.max(tL, tS, rL, rS);
  let phase = 'neutral', dir = 'neutral', isRev = false, rr = null;

  if (best >= 40) {
    if      (tL >= best) { phase = 'trend_long';     dir = 'long';  rr = 1.5; }
    else if (tS >= best) { phase = 'trend_short';    dir = 'short'; rr = 1.5; }
    else if (rL >= best) { phase = 'reversal_long';  dir = 'long';  rr = 3;   isRev = true; }
    else                 { phase = 'reversal_short'; dir = 'short'; rr = 3;   isRev = true; }
  }

  const score = Math.min(100, Math.round(best));
  const squeezeWarn = L.volatility === 'compressed' && L.fundExt;

  let rec = '';
  if (phase === 'neutral') rec = 'Kein dominantes Phase-Signal.';
  else if (!isRev) rec = `Trend ${dir === 'long' ? 'aufwärts' : 'abwärts'} · OI: ${L.oiRegime} · R:R ${rr}:1`;
  else rec = `Umkehr ${dir === 'long' ? 'aufwärts' : 'abwärts'} · Funding-Extrem${L.fundPer ? ' (persistent)' : ''} · R:R ${rr}:1`;
  if (squeezeWarn) rec += ' · ⚠ Squeeze';

  return { score, dir, phase, isRev, rr, rec, sess, squeezeWarn };
}

function getSession() {
  const now = new Date();
  const h = now.getUTCHours() + now.getUTCMinutes() / 60;
  const dow = now.getUTCDay();
  let session = 'dead_zone', act = 0.2;
  if (h >= 13 && h < 17) { session = 'eu_us_overlap'; act = 1.0; }
  else if (h >= 7 && h < 13) { session = 'europe'; act = 0.7; }
  else if (h >= 17 && h < 22) { session = 'us'; act = 0.75; }
  else if (h >= 1 && h < 7)  { session = 'asia'; act = 0.55; }
  if (dow === 1 && h >= 1 && h < 9) act = Math.max(act, 0.8);
  return { session, activityScore: act };
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function zscore(arr) {
  if (arr.length < 5) return 0;
  const mean = arr.reduce((s,v)=>s+v,0)/arr.length;
  const std  = Math.sqrt(arr.reduce((s,v)=>s+(v-mean)**2,0)/arr.length);
  return std < 1e-12 ? 0 : Math.max(-3.8, Math.min(3.8, (arr.at(-1)-mean)/std));
}

function scoreLbl(score, active) {
  if (!active || score < 55) return ['WARTEN', ''];
  if (score >= 83) return ['GOLDGRUBE', 'gp'];
  if (score >= 68) return ['STARK', ''];
  return ['AKTIV', ''];
}

function fmtPrice(p) {
  return p == null ? '–'
    : '$' + p.toLocaleString('de-CH', {minimumFractionDigits:0, maximumFractionDigits:0});
}
function fmtTime(ts) {
  return new Date(ts).toLocaleTimeString('de-CH', {hour:'2-digit', minute:'2-digit'});
}
function dirCls(d) { return d === 'long' ? 'long' : d === 'short' ? 'short' : 'neutral'; }
function dirTxt(d) { return d === 'long' ? '▲ LONG' : d === 'short' ? '▼ SHORT' : '◈ NEUTRAL'; }

// ─── Render ──────────────────────────────────────────────────────────────────
function setStatus(type, text) {
  const d = document.getElementById('dot');
  d.className = 'dot' + (type === 'live' ? ' live' : type === 'warn' ? ' warn' : '');
  document.getElementById('statusTxt').textContent = text;
}

function renderCard(pfx, { score, dir, rr, rec }, lbl, gpClass) {
  const card = document.getElementById(pfx + 'Card');
  card.className = 'card' + (gpClass === 'gp' ? ' gp' : '');
  const sn = document.getElementById(pfx + 'Score');
  sn.textContent = score;
  sn.className = 'score-n'; // remove pulse
  sn.style.color = dir === 'long' ? 'var(--long)' : dir === 'short' ? 'var(--short)' : 'var(--neu)';
  document.getElementById(pfx + 'Lbl').textContent = lbl;
  const dEl = document.getElementById(pfx + 'Dir');
  dEl.textContent = dirTxt(dir);
  dEl.className = 'score-dir ' + dirCls(dir);
  document.getElementById(pfx + 'Rec').textContent = rec;
  const rrEl = document.getElementById(pfx + 'RR');
  rrEl.textContent = rr ? `R:R ${rr}:1` : '';
}

function chip(t, cls) { return `<span class="chip ${cls||''}">${t}</span>`; }

function refresh() {
  // Clock
  document.getElementById('clockEl').textContent =
    new Date().toLocaleTimeString('de-CH', {hour:'2-digit',minute:'2-digit',second:'2-digit'});

  // Price
  document.getElementById('priceEl').textContent = fmtPrice(L.price);
  const pchg = L.price24hChg;
  const pEl = document.getElementById('priceChgEl');
  pEl.textContent = pchg ? (pchg>=0?'+':'') + (pchg*100).toFixed(2)+'% 24h' : '';
  pEl.style.color = pchg >= 0 ? 'var(--long)' : 'var(--short)';

  if (!L.dataReady) return;

  const wave  = computeWave();
  const phase = computePhase(wave);

  const [wLbl, wGP] = scoreLbl(wave.score, wave.triggered);
  const [pLbl, pGP] = scoreLbl(phase.score, phase.phase !== 'neutral');

  renderCard('wave',  { score:wave.score,  dir:wave.dir,  rr:wave.triggered?1.5:null, rec:wave.rec  }, wLbl, wGP);
  renderCard('phase', { score:phase.score, dir:phase.dir, rr:phase.rr, rec:phase.rec }, pLbl, pGP);

  // Wave chips
  document.getElementById('waveChips').innerHTML = [
    chip(`OFI ${wave.ofiZ}σ`,    Math.abs(parseFloat(wave.ofiZ))>1.5?'g':''),
    chip(`CVD ${wave.cvdTrend}`, L.cvd>0?'g':'r'),
    chip(`Tiefe ${wave.depthRatio}`, parseFloat(wave.depthRatio)>1.2?'g':parseFloat(wave.depthRatio)<0.85?'r':''),
    chip(`Vol ${L.volatility}`,   L.volatility==='compressed'?'y':''),
    chip(`Funding ${(L.fundRate*100).toFixed(4)}%`, L.fundExt?(L.fundSig.includes('pos')?'r':'g'):''),
  ].join('');

  // Phase chips
  document.getElementById('phaseChips').innerHTML = [
    chip(`OI ${L.oiRegime}`, ['long_build','short_cover'].includes(L.oiRegime)?'g':['short_build','long_exit'].includes(L.oiRegime)?'r':''),
    chip(L.fundSig, L.fundExt?(L.fundSig.includes('pos')?'r':'g'):''),
    chip(phase.sess.session.replace(/_/g,' '), phase.sess.activityScore>=0.7?'g':''),
    chip(`Wave ${wave.dir}`, wave.triggered?(wave.dir==='long'?'g':'r'):''),
    phase.squeezeWarn ? chip('⚠ Squeeze', 'y') : '',
  ].filter(Boolean).join('');

  // Save to history
  saveHist({ ts:Date.now(), wS:wave.score, wD:wave.dir, wL:wLbl, pS:phase.score, pD:phase.dir, pL:pLbl });
  renderHist();
}

// ─── localStorage history ─────────────────────────────────────────────────────
const HIST_KEY = 'btcSigHist_v2';

function loadHist() {
  try { return JSON.parse(localStorage.getItem(HIST_KEY) || '[]'); } catch { return []; }
}
function saveHist(entry) {
  try {
    const arr = loadHist();
    // Avoid duplicate saves within 4 minutes
    if (arr.length && Date.now() - arr.at(-1).ts < 240_000) return;
    arr.push(entry);
    if (arr.length > 120) arr.splice(0, arr.length - 120);
    localStorage.setItem(HIST_KEY, JSON.stringify(arr));
  } catch(_) {}
}
function renderHist() {
  const hist = loadHist().slice(-8).reverse();
  const el = document.getElementById('histList');
  if (!hist.length) return;
  el.innerHTML = hist.map(h => `
    <div class="hist-row">
      <span class="hist-time">${fmtTime(h.ts)}</span>
      <div style="display:flex;gap:8px">
        <span class="hs" style="color:${h.pD==='long'?'var(--long)':h.pD==='short'?'var(--short)':'var(--neu)'}">P:${h.pS} ${h.pL}</span>
        <span style="color:var(--dim)">·</span>
        <span class="hs" style="color:${h.wD==='long'?'var(--long)':h.wD==='short'?'var(--short)':'var(--neu)'}">W:${h.wS} ${h.wL}</span>
      </div>
    </div>`).join('');
}

// ─── PWA install ──────────────────────────────────────────────────────────────
let deferredInstall = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredInstall = e;
  document.getElementById('installBanner').style.display = 'flex';
});
document.getElementById('installBtn').addEventListener('click', async () => {
  if (!deferredInstall) return;
  deferredInstall.prompt();
  await deferredInstall.userChoice;
  deferredInstall = null;
  document.getElementById('installBanner').style.display = 'none';
});
window.addEventListener('appinstalled', () => {
  document.getElementById('installBanner').style.display = 'none';
});

// ─── Boot ─────────────────────────────────────────────────────────────────────
fetch24h();
connect();
fetchOI();
snapshotCVD();
setInterval(fetchOI, 30_000);
setInterval(snapshotCVD, 30_000);
setInterval(refresh, 5_000);
renderHist(); // Show cached history immediately
refresh();
