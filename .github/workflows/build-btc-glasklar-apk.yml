name: Build BTC Glasklar APK

on:
  push:
    paths:
      - 'BtcGlasklarApk/**'
      - 'BtcBacktest4Y/**'
      - '.github/workflows/build-btc-glasklar-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager 'platforms;android-35' 'build-tools;35.0.0'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build debug APK
        run: gradle -p BtcGlasklarApk clean :app:assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BTC-Lern-Dashboard-V100
          path: BtcGlasklarApk/app/build/outputs/apk/debug/app-debug.apk

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python packages
        run: pip install pandas numpy requests

      - name: Run 6 year BTC backtest
        run: python BtcBacktest4Y/backtest_btc_glasklar_6y.py

      - name: Upload backtest results
        uses: actions/upload-artifact@v4
        with:
          name: BTC-6Y-Backtest-Results
          path: BtcBacktest4Y/out
